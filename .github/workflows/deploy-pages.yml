name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, gdt-ai]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "gdt-admin"
          git config user.email "admin@diagnostic.ly"

          # Copy site content to temp dir
          mkdir -p /tmp/pages-deploy
          cp index.html /tmp/pages-deploy/
          echo "status.diagnostic.ly" > /tmp/pages-deploy/CNAME
          touch /tmp/pages-deploy/.nojekyll

          # Force-push to gh-pages
          git fetch origin gh-pages || true
          git worktree add /tmp/gh-pages-wt gh-pages 2>/dev/null || \
            git worktree add /tmp/gh-pages-wt -b gh-pages origin/gh-pages

          cp /tmp/pages-deploy/* /tmp/gh-pages-wt/
          cd /tmp/gh-pages-wt
          git add -A
          git diff --staged --quiet || git commit -m "deploy: update status dashboard"
          git push origin gh-pages

          # Cleanup
          git -C /tmp/gh-pages-wt worktree remove /tmp/gh-pages-wt --force 2>/dev/null || true
